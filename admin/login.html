<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Login | La Trama</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

    <main class="admin-login-shell">
        <div class="admin-card">
            <h1 class="admin-title">Panel de Administración</h1>
            <p class="admin-subtitle">Iniciá sesión para gestionar profesionales.</p>

            <form id="loginForm" class="admin-form" novalidate>
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-control" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" class="form-control" autocomplete="current-password" required>
                </div>

                <p id="loginError" class="admin-error" role="alert"></p>

                <button type="submit" id="loginSubmit" class="btn-primary admin-btn-full">Ingresar</button>
            </form>
        </div>
    </main>

    <script type="module" src="../js/admin-auth.js"></script>
</body>
</html>
