<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#7c4dff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0c1a3b"/>
    </linearGradient>
    <linearGradient id="figure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c6bff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#4a2080" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)"/>

  <ellipse cx="100" cy="95" rx="62" ry="72" fill="url(#glow)"/>

  <!-- estrellas -->
  <circle cx="24" cy="22" r="1.3" fill="#e2c96b" opacity="0.9"/>
  <circle cx="52" cy="12" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="178" cy="28" r="1.2" fill="#e2c96b" opacity="0.8"/>
  <circle cx="162" cy="14" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="188" cy="78" r="0.9" fill="#b39ddb" opacity="0.9"/>
  <circle cx="8"   cy="108" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="193" cy="158" r="1"   fill="#e2c96b" opacity="0.6"/>
  <circle cx="12"  cy="178" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="92"  cy="8"   r="0.7" fill="#b39ddb" opacity="0.8"/>
  <circle cx="142" cy="186" r="1"   fill="white" opacity="0.4"/>
  <circle cx="30"  cy="155" r="0.7" fill="#e2c96b" opacity="0.5"/>

  <!-- luna creciente -->
  <path d="M154 24 Q166 17 175 27 Q155 32 154 24Z" fill="#e2c96b" opacity="0.85"/>

  <!-- cuerpo / túnica -->
  <path d="M62 80 Q70 52 100 47 Q130 52 138 80 L156 178 Q100 192 44 178 Z" fill="url(#figure)"/>

  <!-- cabeza -->
  <circle cx="100" cy="70" r="24" fill="url(#figure)"/>

  <!-- sombra de capucha sobre el rostro -->
  <ellipse cx="100" cy="64" rx="18" ry="10" fill="#1a0533" opacity="0.25"/>

  <!-- brillo suelo -->
  <ellipse cx="100" cy="185" rx="50" ry="7" fill="#7c4dff" opacity="0.15"/>

  <!-- destello 4 puntas izquierda -->
  <path d="M37 88 L39.5 81 L42 88 L49 90.5 L42 93 L39.5 100 L37 93 L30 90.5 Z"
        fill="#e2c96b" opacity="0.55"/>

  <!-- destello 4 puntas derecha -->
  <path d="M158 103 L160 97 L162 103 L168 105.5 L162 108 L160 114 L158 108 L152 105.5 Z"
        fill="#9b6dff" opacity="0.65"/>
</svg>
