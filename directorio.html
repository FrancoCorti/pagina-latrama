<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio Completo | La Trama</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="directorio">

    <header class="navbar">
        <a href="index.html" class="logo"><img src="assets/logo-tarot.png" alt="La Trama"></a>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html#home">Inicio</a></li>
                <li><a href="directorio.html">Directorio</a></li>
                <li><a href="index.html#contacto">Contacto</a></li>
            </ul>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Abrir menú">
            <span></span><span></span><span></span>
        </button>
    </header>

    <main class="main-content">
        <section class="filter-section reveal">
            <div class="container">
                <h1 class="section-title" style="margin-bottom: 2rem;">Nuestros <span class="gradient-text">Guías</span></h1>
                
                <div class="filters-container-box">
                    <div class="filters-wrapper">
                        <div class="search-box">
                            <i data-lucide="search"></i>
                            <input type="text" id="searchInput" placeholder="Buscar por nombre o técnica...">
                        </div>
                        
                        <select id="techFilter" class="filter-select">
                            <option value="all">Todas las Técnicas</option>
                        </select>

                        <select id="sortFilter" class="filter-select">
                            <option value="default">Ordenar por...</option>
                            <option value="rating-desc">Mejor Calificados</option>
                            <option value="name-asc">Nombre (A-Z)</option>
                        </select>

                        <button id="resetFilters" class="btn-icon" title="Limpiar Filtros">
                            <i data-lucide="rotate-ccw"></i>
                        </button>
                    </div>
                    <p id="results-count" class="results-info">Conectando con la base de datos...</p>
                </div>
            </div>
        </section>

        <section class="directory-container">
            <div id="grid-full-profesionales" class="grid-container">
                <div class="loader-container">
                    <div class="loader"></div>
                    <p>Sintonizando con el universo de guías...</p>
                </div>
            </div>
            
            <div id="no-results" class="hidden no-results-box reveal">
                <i data-lucide="search-x" size="48"></i>
                <p>No encontramos guías que coincidan con tu búsqueda.</p>
                <button onclick="document.getElementById('resetFilters').click()" class="btn-secondary">Ver todos los guías</button>
            </div>
        </section>
    </main>

    <footer class="main-footer reveal">
        <div class="footer-bottom">
            <p>&copy; 2026 La Trama. Tu camino hacia el bienestar.</p>
        </div>
    </footer>

    <div id="perfilModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModal()" aria-label="Cerrar modal"><i data-lucide="x"></i></button>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
